spring:
  application:
    name: userService
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/family_budget_user
    driver-class-name: org.postgresql.Driver
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
  flyway:
    locations: classpath:db/migration
    baseline-on-migrate: true
    schemas: public
  redis:
    host: ${REDIS_HOST:localhost}
    port: 6379

  cache:
    caffeine:
      spec: maximumSize=500,expireAfterWrite=60s,recordStats
    redis:
      time-to-live: 10m
#  cache:
#    type: caffeine
#    cache-names:
#      - users
#    caffeine:
#      spec: maximumSize=500,expireAfterWrite=10m,recordStats
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    oauth:
      client-id: fb-webapp-client
      use-pkce-with-authorization-code-grant: true

server:
  port: 8081

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
      show-components: always
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

---
spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/my-realm}
#          jwk-set-uri: ${KEYCLOAK_JWK_URI:http://localhost:8080/realms/my-realm/protocol/openid-connect/certs}