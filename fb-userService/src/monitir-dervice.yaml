apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: fb-user-service
  namespace: monitoring
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: fb-user-service
  namespaceSelector:
    any: true
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s