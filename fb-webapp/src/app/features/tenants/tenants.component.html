<div class="tenants-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Tenant Management</mat-card-title>
      <button mat-raised-button color="primary" (click)="openCreateDialog()">
        <mat-icon>add</mat-icon>
        Add Tenant
      </button>
    </mat-card-header>

    <mat-card-content>
      <table mat-table [dataSource]="tenants" class="tenants-table">
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Name</th>
          <td mat-cell *matCellDef="let tenant">{{ tenant.name }}</td>
        </ng-container>

        <ng-container matColumnDef="description">
          <th mat-header-cell *matHeaderCellDef>Description</th>
          <td mat-cell *matCellDef="let tenant">{{ tenant.description || '-' }}</td>
        </ng-container>

        <ng-container matColumnDef="type">
          <th mat-header-cell *matHeaderCellDef>Type</th>
          <td mat-cell *matCellDef="let tenant">
            <mat-chip [class]="getTypeClass(tenant.type)">
              {{ tenant.type }}
            </mat-chip>
          </td>
        </ng-container>

        <ng-container matColumnDef="createdBy">
          <th mat-header-cell *matHeaderCellDef>Created By</th>
          <td mat-cell *matCellDef="let tenant">{{ tenant.createdBy || '-' }}</td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let tenant">
            <button mat-icon-button color="primary" (click)="openEditDialog(tenant)" matTooltip="Edit">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="confirmDelete(tenant)" matTooltip="Delete">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>

      <div *ngIf="tenants.length === 0 && !loading" class="empty-state">
        No tenants found. Click "Add Tenant" to create one.
      </div>
    </mat-card-content>
  </mat-card>
</div>
