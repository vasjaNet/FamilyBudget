<h2 mat-dialog-title>{{ data.mode === 'create' ? 'Create Tenant' : 'Edit Tenant' }}</h2>
<form [formGroup]="tenantForm" (ngSubmit)="onSubmit()">
  <mat-dialog-content>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Name</mat-label>
      <input matInput formControlName="name" placeholder="Enter tenant name">
      <mat-error *ngIf="tenantForm.get('name')?.hasError('required')">
        Name is required
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Description</mat-label>
      <textarea matInput formControlName="description" placeholder="Enter description" rows="3"></textarea>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Type</mat-label>
      <mat-select formControlName="type">
        <mat-option value="PERSONAL">Personal</mat-option>
        <mat-option value="FAMILY">Family</mat-option>
        <mat-option value="BUSINESS">Business</mat-option>
      </mat-select>
      <mat-error *ngIf="tenantForm.get('type')?.hasError('required')">
        Type is required
      </mat-error>
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="onCancel()">Cancel</button>
    <button mat-raised-button color="primary" type="submit" [disabled]="tenantForm.invalid || loading">
      <mat-spinner *ngIf="loading" diameter="20" class="spinner"></mat-spinner>
      <span *ngIf="!loading">{{ data.mode === 'create' ? 'Create' : 'Update' }}</span>
    </button>
  </mat-dialog-actions>
</form>
