apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-user-service-config
  labels:
    {{- include "family-budget.labels" . | nindent 4 }}
data:
  DB_HOST: "{{ .Release.Name }}-postgres"
  DB_PORT: "5432"
  DB_NAME: "{{ .Values.infra.postgres.database }}"
  REDIS_HOST: "{{ .Release.Name }}-redis"
  REDIS_PORT: "6379"
