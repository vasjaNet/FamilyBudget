{{- if .Values.monitoring.enabled }}
{{- range $name, $svc := .Values.services }}
{{- if $svc.actuator }}
{{- $svcName := $name | kebabcase }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ $.Release.Name }}-{{ $svcName }}
  namespace: {{ $.Values.monitoring.namespace }}
  labels:
    {{- include "family-budget.labels" $ | nindent 4 }}
    release: monitoring
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $svcName }}
      app.kubernetes.io/instance: {{ $.Release.Name }}
  namespaceSelector:
    any: true
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
{{- end }}
{{- end }}
{{- end }}
