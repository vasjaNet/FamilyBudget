name: CI Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    name: Build (Gradle + Angular)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            fb-commons-lib/build/classes/java/main
            fb-userService/build/classes/java/main
            fb-chatService/build/classes/java/main
          retention-days: 1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Angular dependencies
        working-directory: fb-webapp
        run: npm ci

      - name: Build Angular app
        working-directory: fb-webapp
        run: npm run build

  dependency-submission:
    name: Submit Dependency Graph
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Generate and submit dependency graph
        uses: gradle/actions/dependency-submission@v4

  sonar:
    name: SonarCloud Analysis
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Angular dependencies
        working-directory: fb-webapp
        run: npm ci

      - name: Build Angular app
        working-directory: fb-webapp
        run: npm run build

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ secrets.SONAR_ORG }}
            -Dsonar.java.binaries=fb-userService/build/classes/java/main,fb-chatService/build/classes/java/main,fb-commons-lib/build/classes/java/main
            -Dsonar.sources=fb-userService/src/main/java,fb-chatService/src/main/java,fb-commons-lib/src/main/java,fb-webapp/src
            -Dsonar.exclusions=fb-webapp/node_modules/**,**/build/**,**/dist/**
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  eslint:
    name: ESLint Check
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: fb-webapp
        run: npm ci

      - name: Run ESLint
        working-directory: fb-webapp
        run: npm run lint