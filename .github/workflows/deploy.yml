name: Build and Push to AWS ECR

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker image tag (optional, defaults to git SHA)'
        required: false
        default: ''
      service:
        description: 'Service to build (fb-webapp, fb-userService, or both)'
        required: false
        default: 'both'

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  determine-matrix:
    name: Determine Build Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          if [[ "${{ github.event.inputs.service }}" == "fb-webapp" ]]; then
            echo 'matrix=["fb-webapp"]'
          elif [[ "${{ github.event.inputs.service }}" == "fb-userService" ]]; then
            echo 'matrix=["fb-userService"]'
          else
            echo 'matrix=["fb-webapp","fb-userService"]'
          fi >> $GITHUB_OUTPUT

  build-and-push:
    name: Build & Push Docker Image (${{ matrix.service }})
    needs: determine-matrix
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJson(needs.determine-matrix.outputs.matrix) }}
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up JDK 21
        if: matrix.service == 'fb-userService'
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        if: matrix.service == 'fb-userService'
        uses: gradle/actions/setup-gradle@v4

      - name: Build JAR for userService
        if: matrix.service == 'fb-userService'
        run: |
          chmod +x ./gradlew
          ./gradlew :fb-userService:bootJar -x test

      - name: Set image tag and ECR repository name
        id: set-vars
        run: |
          # Set image tag
          if [[ -n "${{ github.event.inputs.tag }}" ]]; then
            echo "tag=${{ github.event.inputs.tag }}"
          else
            echo "tag=${{ github.sha }}"
          fi >> $GITHUB_OUTPUT

          # Map service directory to ECR repository name (lowercase with hyphens)
          if [[ "${{ matrix.service }}" == "fb-userService" ]]; then
            echo "ecr_repo=fb-user-service"
          else
            echo "ecr_repo=${{ matrix.service }}"
          fi >> $GITHUB_OUTPUT

      - name: Build, tag, and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.set-vars.outputs.tag }}
          ECR_REPO: ${{ steps.set-vars.outputs.ecr_repo }}
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPO:latest \
            ./${{ matrix.service }}

          docker push $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPO:latest
          echo "Image pushed: $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG"
